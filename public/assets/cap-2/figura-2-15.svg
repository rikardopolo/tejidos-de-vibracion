<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img" aria-labelledby="t215">
  <title id="t215">Mapa conceptual jerárquico del Capítulo 2 — la ciencia que aprendió a escuchar</title>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Mapa conceptual del Capítulo 2</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">la ciencia que aprendió a escuchar · diez voces, una sintaxis común</text>

  <!-- ============ NODO RAÍZ ============ -->
  <g transform="translate(360,90)">
    <rect x="-160" y="0" width="320" height="48" rx="3" fill="#1A1A1A" stroke="#1A1A1A"/>
    <text x="0" y="20" font-family="Georgia, serif" font-size="13" fill="#F2EAD5" text-anchor="middle">LA CIENCIA QUE APRENDIÓ A ESCUCHAR</text>
    <text x="0" y="38" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#E5C76A" text-anchor="middle">cuatro siglos de vibración</text>
  </g>

  <!-- Conectores raíz → 3 ramas primarias -->
  <line x1="360" y1="138" x2="360" y2="170" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="160" y1="170" x2="560" y2="170" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="160" y1="170" x2="160" y2="195" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="360" y1="170" x2="360" y2="195" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="560" y1="170" x2="560" y2="195" stroke="#1A1A1A" stroke-width="1"/>

  <!-- RAMA 1: Física Clásica -->
  <g transform="translate(160,195)">
    <rect x="-105" y="0" width="210" height="38" rx="3" fill="#B68914"/>
    <text x="0" y="16" font-family="Georgia, serif" font-size="12" fill="#F2EAD5" text-anchor="middle">FÍSICA CLÁSICA</text>
    <text x="0" y="30" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#F2EAD5" text-anchor="middle">siglos XVII–XIX</text>
  </g>

  <!-- RAMA 2: Umbral Cuántico -->
  <g transform="translate(360,195)">
    <rect x="-105" y="0" width="210" height="38" rx="3" fill="#2D1B69"/>
    <text x="0" y="16" font-family="Georgia, serif" font-size="12" fill="#F2EAD5" text-anchor="middle">UMBRAL CUÁNTICO</text>
    <text x="0" y="30" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#F2EAD5" text-anchor="middle">1900–1926</text>
  </g>

  <!-- RAMA 3: Frontera Actual -->
  <g transform="translate(560,195)">
    <rect x="-105" y="0" width="210" height="38" rx="3" fill="#9B2A2A"/>
    <text x="0" y="16" font-family="Georgia, serif" font-size="12" fill="#F2EAD5" text-anchor="middle">FRONTERA ACTUAL</text>
    <text x="0" y="30" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#F2EAD5" text-anchor="middle">siglo XXI</text>
  </g>

  <!-- Conectores rama 1 → 5 hijos -->
  <line x1="160" y1="233" x2="160" y2="260" stroke="#B68914" stroke-width="0.8"/>
  <line x1="55" y1="260" x2="265" y2="260" stroke="#B68914" stroke-width="0.8"/>

  <!-- Conectores rama 2 → 3 hijos -->
  <line x1="360" y1="233" x2="360" y2="260" stroke="#2D1B69" stroke-width="0.8"/>
  <line x1="280" y1="260" x2="440" y2="260" stroke="#2D1B69" stroke-width="0.8"/>

  <!-- Conectores rama 3 → 2 hijos -->
  <line x1="560" y1="233" x2="560" y2="260" stroke="#9B2A2A" stroke-width="0.8"/>
  <line x1="500" y1="260" x2="620" y2="260" stroke="#9B2A2A" stroke-width="0.8"/>

  <!-- HIJOS RAMA 1 -->
  <g font-family="Georgia, serif" font-size="10" text-anchor="middle">
    <g transform="translate(55,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#B68914" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#B68914">§2.1</text>
      <text x="0" y="38" fill="#1A1A1A">Galileo</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">1638</text>
    </g>
    <g transform="translate(110,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#B68914" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#B68914">§2.2</text>
      <text x="0" y="38" fill="#1A1A1A">Mersenne</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">1636</text>
    </g>
    <g transform="translate(160,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#B68914" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#B68914">§2.3</text>
      <text x="0" y="38" fill="#1A1A1A">D'Alembert</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">Euler · Bernoulli</text>
    </g>
    <g transform="translate(215,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#B68914" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#B68914">§2.4</text>
      <text x="0" y="38" fill="#1A1A1A">Helmholtz</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">1863</text>
    </g>
    <g transform="translate(265,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#B68914" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#B68914">§2.5</text>
      <text x="0" y="38" fill="#1A1A1A">Maxwell</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">1865</text>
    </g>
  </g>

  <!-- HIJOS RAMA 2 -->
  <g font-family="Georgia, serif" font-size="10" text-anchor="middle">
    <g transform="translate(290,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#2D1B69" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#2D1B69">§2.6</text>
      <text x="0" y="38" fill="#1A1A1A">Planck</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">Einstein</text>
    </g>
    <g transform="translate(370,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#2D1B69" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#2D1B69">§2.7</text>
      <text x="0" y="38" fill="#1A1A1A">Fonones</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">Debye · Tamm</text>
    </g>
    <g transform="translate(440,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#2D1B69" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#2D1B69">§2.10</text>
      <text x="0" y="38" fill="#1A1A1A">Schrödinger</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">1926</text>
    </g>
  </g>

  <!-- HIJOS RAMA 3 -->
  <g font-family="Georgia, serif" font-size="10" text-anchor="middle">
    <g transform="translate(500,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#9B2A2A" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#9B2A2A">§2.8</text>
      <text x="0" y="38" fill="#1A1A1A">Gimzewski</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">2004 · levadura</text>
    </g>
    <g transform="translate(620,275)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#9B2A2A" stroke-width="0.8"/>
      <text x="0" y="24" font-size="10" font-style="italic" fill="#9B2A2A">§2.9</text>
      <text x="0" y="38" fill="#1A1A1A">LIGO</text>
      <text x="0" y="50" fill="#8A8A8A" font-size="9">2015 · GW150914</text>
    </g>
  </g>

  <!-- RELACIÓN HORIZONTAL: ecuación de onda clásica → función de onda cuántica -->
  <g transform="translate(360,370)">
    <rect x="-200" y="0" width="400" height="60" rx="4" fill="#E5DBBE" stroke="#B68914" stroke-width="0.8"/>
    <text x="0" y="20" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="middle">eje arquitectónico central</text>
    <text x="-100" y="44" font-family="Georgia, serif" font-size="11" fill="#B68914" text-anchor="middle">ecuación de onda (§2.3)</text>
    <text x="0" y="44" font-family="Georgia, serif" font-size="14" fill="#1A1A1A" text-anchor="middle">→</text>
    <text x="100" y="44" font-family="Georgia, serif" font-size="11" fill="#2D1B69" text-anchor="middle">función de onda ψ (§2.10)</text>
  </g>

  <text x="360" y="455" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">
    misma estructura matemática · ontologías distintas (algo material vs. probabilidad)
  </text>

  <!-- Conector hacia Cap. 3 -->
  <line x1="360" y1="475" x2="360" y2="505" stroke="#1A1A1A" stroke-width="1"/>
  <path d="M354 500 L 360 510 L 366 500 Z" fill="#1A1A1A"/>

  <g transform="translate(360,510)">
    <rect x="-160" y="0" width="320" height="50" rx="3" fill="#1A1A1A"/>
    <text x="0" y="20" font-family="Georgia, serif" font-size="12" fill="#F2EAD5" text-anchor="middle">PUENTE AL CAP. 3 · EL MUNDO CUÁNTICO</text>
    <text x="0" y="38" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#E5C76A" text-anchor="middle">doble rendija · gato · EPR · interpretaciones</text>
  </g>

  <text x="360" y="586" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">cosmología completa de la vibración como fenómeno físico unificado</text>
</svg>
