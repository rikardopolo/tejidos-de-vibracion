name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Guard anti-recaída: ningún artefacto generado debe entrar al repo.
      - name: Guard · sin artefactos generados en git
        run: |
          if git ls-files | grep -nE 'graphify-out|/out/'; then
            echo "::error::Artefacto generado trackeado en git (ver arriba)."
            exit 1
          fi

      # Guard anti-recaída: ninguna imagen NUEVA en public/ debe superar 1MB.
      - name: Guard · imágenes nuevas en public <1MB
        run: |
          base=$(git merge-base origin/main HEAD)
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            sz=$(stat -c%s "$f")
            if [ "$sz" -gt 1048576 ]; then
              echo "::error::$f pesa $((sz/1024)) KB (>1MB). Optimizar antes de commitear."
              fail=1
            fi
          done < <(git diff --name-only --diff-filter=AM "$base" HEAD -- 'public')
          exit $fail

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (astro check)
        run: pnpm exec astro check

      - name: Build
        run: pnpm build
