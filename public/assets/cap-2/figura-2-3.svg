<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="t23">
  <title id="t23">Cóclea humana desenrollada con organización tonotópica de la membrana basilar</title>
  <defs>
    <linearGradient id="basilar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D1B69" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#B68914" stop-opacity="0.9"/>
    </linearGradient>
    <marker id="ar23" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A8A8A"/>
    </marker>
  </defs>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Cóclea desenrollada · el piano biológico de Helmholtz</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">cada frecuencia incidente excita una región específica de la membrana basilar</text>

  <!-- Cóclea espiral real (panel izquierdo) -->
  <g transform="translate(70,180)">
    <!-- Spiral de Arquímedes simplificado -->
    <path d="M 0 0
             m 0 -8
             a 8 8 0 1 1 0 16 a 8 8 0 1 1 0 -16
             m 0 -16 a 16 16 0 1 1 0 32 a 16 16 0 1 1 0 -32
             m 0 -28 a 28 28 0 1 1 0 56 a 28 28 0 1 1 0 -56"
          stroke="#D88FA8" stroke-width="3" fill="none" opacity="0.85"/>
    <circle cx="0" cy="0" r="3" fill="#2D1B69"/>
    <text x="0" y="60" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">cóclea anatómica</text>
    <text x="0" y="74" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">~5 mm diámetro · 2½ vueltas</text>
  </g>

  <!-- Flecha "desenrollar" -->
  <line x1="135" y1="180" x2="195" y2="180" stroke="#8A8A8A" stroke-width="1.5" marker-end="url(#ar23)"/>
  <text x="165" y="172" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#8A8A8A" text-anchor="middle">desenrollar</text>

  <!-- Membrana basilar desenrollada -->
  <g transform="translate(200,140)">
    <!-- Forma trapezoidal: fina en base izq, ancha en ápice der -->
    <path d="M0 18 L460 0 L460 76 L0 58 Z" fill="url(#basilar)" opacity="0.92"/>
    <!-- Borde -->
    <path d="M0 18 L460 0 L460 76 L0 58 Z" fill="none" stroke="#1A1A1A" stroke-width="1"/>

    <!-- Líneas verticales que marcan zonas tonotópicas -->
    <line x1="40"  y1="20" x2="40"  y2="57" stroke="#F2EAD5" stroke-width="0.7" opacity="0.7"/>
    <line x1="150" y1="14" x2="150" y2="63" stroke="#F2EAD5" stroke-width="0.7" opacity="0.7"/>
    <line x1="260" y1="10" x2="260" y2="68" stroke="#F2EAD5" stroke-width="0.7" opacity="0.7"/>
    <line x1="370" y1="6" x2="370" y2="73" stroke="#F2EAD5" stroke-width="0.7" opacity="0.7"/>

    <!-- Etiquetas de frecuencia -->
    <text x="20"  y="-10" font-family="Georgia, serif" font-size="11" fill="#2D1B69" text-anchor="middle">20 kHz</text>
    <text x="130" y="-10" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">4 kHz</text>
    <text x="240" y="-10" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">1 kHz</text>
    <text x="350" y="-10" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">200 Hz</text>
    <text x="450" y="-10" font-family="Georgia, serif" font-size="11" fill="#B68914" text-anchor="middle">20 Hz</text>

    <!-- Etiquetas estructurales -->
    <text x="20"  y="100" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">base</text>
    <text x="20"  y="114" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">fina · rígida</text>
    <text x="450" y="100" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">ápice</text>
    <text x="450" y="114" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">ancha · flexible</text>

    <!-- Células ciliadas (puntos pequeños sobre la membrana) -->
    <g fill="#F2EAD5" stroke="#1A1A1A" stroke-width="0.4">
      <circle cx="60"  cy="33" r="2"/>
      <circle cx="100" cy="32" r="2"/>
      <circle cx="140" cy="30" r="2"/>
      <circle cx="180" cy="28" r="2"/>
      <circle cx="220" cy="27" r="2"/>
      <circle cx="260" cy="26" r="2"/>
      <circle cx="300" cy="24" r="2"/>
      <circle cx="340" cy="23" r="2"/>
      <circle cx="380" cy="21" r="2"/>
      <circle cx="420" cy="20" r="2"/>
    </g>
    <text x="230" y="148" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">células ciliadas internas (CCI) y externas (CCE) — ~15.500 en total</text>
  </g>

  <!-- Rango general -->
  <text x="360" y="395" font-family="Georgia, serif" font-size="12" fill="#1A1A1A" text-anchor="middle">
    Rango audible humano sano: <tspan font-style="italic" fill="#B68914">20 Hz — 20 000 Hz</tspan>
  </text>
</svg>
