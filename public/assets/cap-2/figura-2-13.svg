<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="t213">
  <title id="t213">Función de onda compleja ψ frente a onda clásica real u(x)</title>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Onda clásica real vs. función de onda cuántica</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">misma estructura matemática, ontologías radicalmente distintas</text>

  <!-- ============ PANEL IZQUIERDO: u(x) real ============ -->
  <text x="180" y="88" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2D1B69" text-anchor="middle">onda clásica  ·  u(x) ∈ ℝ</text>

  <!-- Marco -->
  <rect x="60" y="105" width="280" height="200" fill="#F2EAD5" stroke="#B8B3AB" stroke-width="0.6"/>

  <!-- Ejes -->
  <line x1="80" y1="285" x2="320" y2="285" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="80" y1="125" x2="80" y2="285" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- Sinusoide real (indigo) -->
  <path d="M80 205 Q 110 130 140 205 Q 170 280 200 205 Q 230 130 260 205 Q 290 280 320 205"
        stroke="#2D1B69" stroke-width="2.4" fill="none"/>

  <!-- Etiquetas ejes -->
  <text x="76" y="135" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1A1A1A" text-anchor="end">u</text>
  <text x="328" y="298" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1A1A1A">x</text>

  <text x="200" y="335" font-family="Georgia, serif" font-size="11" fill="#3A3530" text-anchor="middle">desplazamiento físico observable</text>
  <text x="200" y="350" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">altura de la cuerda · presión del aire</text>

  <!-- ============ PANEL DERECHO: ψ(x) compleja ============ -->
  <text x="540" y="88" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2D1B69" text-anchor="middle">función de onda cuántica  ·  ψ(x) ∈ ℂ</text>

  <rect x="400" y="105" width="280" height="200" fill="#F2EAD5" stroke="#B8B3AB" stroke-width="0.6"/>

  <!-- Ejes -->
  <line x1="420" y1="285" x2="660" y2="285" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="420" y1="125" x2="420" y2="285" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- ψ_real (indigo sólida) -->
  <path d="M420 205 Q 450 130 480 205 Q 510 280 540 205 Q 570 130 600 205 Q 630 280 660 205"
        stroke="#2D1B69" stroke-width="2.4" fill="none"/>

  <!-- ψ_imag (verde punteada, desfasada 90°) -->
  <path d="M420 280 Q 450 205 480 130 Q 510 205 540 280 Q 570 205 600 130 Q 630 205 660 280"
        stroke="#1D9E75" stroke-width="2" fill="none" stroke-dasharray="5 4"/>

  <!-- Etiquetas ejes -->
  <text x="416" y="135" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1A1A1A" text-anchor="end">ψ</text>
  <text x="668" y="298" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1A1A1A">x</text>

  <!-- Mini-leyenda -->
  <g transform="translate(440,332)" font-family="Georgia, serif" font-size="10">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#2D1B69" stroke-width="2.4"/>
    <text x="26" y="3" fill="#1A1A1A">Re[ψ]</text>
    <line x1="80" y1="0" x2="100" y2="0" stroke="#1D9E75" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="106" y="3" fill="#1A1A1A">Im[ψ]</text>
  </g>
  <text x="540" y="354" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#8A8A8A" text-anchor="middle">ninguna parte es directamente observable</text>

  <!-- ============ BANDA INFERIOR: |ψ|² densidad probabilidad ============ -->
  <text x="540" y="385" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#B68914" text-anchor="middle">|ψ(x)|² · densidad de probabilidad</text>

  <rect x="400" y="395" width="280" height="60" fill="#F2EAD5" stroke="#B68914" stroke-width="0.8"/>

  <!-- Curva |ψ|² siempre positiva (cuadrado de seno) -->
  <line x1="420" y1="448" x2="660" y2="448" stroke="#1A1A1A" stroke-width="0.6"/>
  <!-- Trazado: dos lóbulos positivos por cada oscilación de ψ -->
  <path d="M420 448
           C 430 410, 450 405, 460 448
           C 470 410, 490 405, 500 448
           C 510 410, 530 405, 540 448
           C 550 410, 570 405, 580 448
           C 590 410, 610 405, 620 448
           C 630 410, 650 405, 660 448"
        stroke="#B68914" stroke-width="2.2" fill="none"/>

  <text x="540" y="475" font-family="Georgia, serif" font-size="10" fill="#3A3530" text-anchor="middle">
    regla de Born (1926) · la probabilidad es lo que se observa, no la onda
  </text>

  <!-- Etiqueta de relación entre paneles -->
  <text x="180" y="385" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#1A1A1A" text-anchor="middle">↔  estructura formal análoga  ↔</text>
  <text x="180" y="408" font-family="Georgia, serif" font-size="11" fill="#8A8A8A" text-anchor="middle">algo material que oscila</text>
  <text x="180" y="424" font-family="Georgia, serif" font-size="11" fill="#8A8A8A" text-anchor="middle">vs. distribución de probabilidad</text>
  <text x="180" y="455" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#B68914" text-anchor="middle">λ = h/p · de Broglie 1924</text>
</svg>
