<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t28">
  <title id="t28">El efecto fotoeléctrico explicado por Einstein en 1905 — esquema físico y linealidad K_max contra frecuencia</title>
  <defs>
    <marker id="ar28" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D1B69"/>
    </marker>
  </defs>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">El efecto fotoeléctrico · Einstein, 1905</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">cada fotón individual entrega su energía completa a un solo electrón</text>

  <!-- ===================== PANEL IZQUIERDO ===================== -->
  <text x="170" y="80" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2D1B69" text-anchor="middle">esquema físico</text>

  <!-- Superficie metálica (Cesio) -->
  <rect x="50" y="280" width="240" height="40" fill="#B8B3AB" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Hatching diagonal sutil -->
  <g stroke="#3A3530" stroke-width="0.5" opacity="0.4">
    <line x1="60" y1="320" x2="80" y2="280"/>
    <line x1="90" y1="320" x2="110" y2="280"/>
    <line x1="120" y1="320" x2="140" y2="280"/>
    <line x1="150" y1="320" x2="170" y2="280"/>
    <line x1="180" y1="320" x2="200" y2="280"/>
    <line x1="210" y1="320" x2="230" y2="280"/>
    <line x1="240" y1="320" x2="260" y2="280"/>
  </g>
  <text x="170" y="340" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#3A3530" text-anchor="middle">metal (Cs, Na, K…)</text>

  <!-- Fotones llegando (paquetes ondulatorios oro) -->
  <g stroke="#B68914" stroke-width="1.5" fill="none">
    <path d="M90 100 q 4 -6 8 0 q 4 6 8 0 q 4 -6 8 0" />
    <line x1="106" y1="100" x2="106" y2="276" stroke-dasharray="2 3" stroke-width="0.8"/>
    <text x="106" y="92" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">hν</text>

    <path d="M160 130 q 4 -6 8 0 q 4 6 8 0 q 4 -6 8 0" />
    <line x1="176" y1="130" x2="176" y2="276" stroke-dasharray="2 3" stroke-width="0.8"/>
    <text x="176" y="122" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">hν</text>

    <path d="M225 110 q 4 -6 8 0 q 4 6 8 0 q 4 -6 8 0" />
    <line x1="241" y1="110" x2="241" y2="276" stroke-dasharray="2 3" stroke-width="0.8"/>
    <text x="241" y="102" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">hν</text>
  </g>

  <!-- Electrones saliendo (azul) -->
  <g fill="#2D1B69">
    <circle cx="106" cy="265" r="4"/>
    <circle cx="176" cy="245" r="4"/>
    <circle cx="241" cy="220" r="4"/>
  </g>
  <!-- Flechas hacia arriba indicando K_max -->
  <line x1="106" y1="265" x2="106" y2="240" stroke="#2D1B69" stroke-width="1.5" marker-end="url(#ar28)"/>
  <line x1="176" y1="245" x2="176" y2="200" stroke="#2D1B69" stroke-width="1.5" marker-end="url(#ar28)"/>
  <line x1="241" y1="220" x2="241" y2="160" stroke="#2D1B69" stroke-width="1.5" marker-end="url(#ar28)"/>

  <text x="115" y="230" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69">e⁻</text>
  <text x="185" y="195" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69">e⁻</text>
  <text x="250" y="155" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69">e⁻ · K_max</text>

  <!-- Función trabajo Φ como barrera -->
  <rect x="40" y="265" width="260" height="8" fill="#B68914" opacity="0.55"/>
  <text x="304" y="272" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#B68914">Φ</text>
  <text x="304" y="284" font-family="Georgia, serif" font-size="9" fill="#8A8A8A">función trabajo</text>

  <!-- Separador vertical -->
  <line x1="345" y1="80" x2="345" y2="380" stroke="#B8B3AB" stroke-width="0.6" stroke-dasharray="4 6"/>

  <!-- ===================== PANEL DERECHO: K_max vs ν ===================== -->
  <text x="540" y="80" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#2D1B69" text-anchor="middle">relación lineal K_max vs ν</text>

  <!-- Ejes -->
  <line x1="400" y1="100" x2="400" y2="340" stroke="#1A1A1A" stroke-width="1.2"/>
  <line x1="400" y1="340" x2="680" y2="340" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- Eje X label -->
  <text x="690" y="358" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#1A1A1A">ν</text>
  <text x="540" y="378" font-family="Georgia, serif" font-size="11" fill="#8A8A8A" text-anchor="middle">frecuencia</text>

  <!-- Eje Y label -->
  <text x="390" y="98" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="end">K_max</text>
  <text x="385" y="220" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle" transform="rotate(-90 385 220)">energía cinética</text>

  <!-- Frecuencia umbral ν₀ -->
  <line x1="455" y1="340" x2="455" y2="346" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="455" y="362" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#B68914" text-anchor="middle">ν₀ = Φ/h</text>

  <!-- Recta de pendiente h, empezando en (455,340) hasta (660,150) -->
  <line x1="455" y1="340" x2="660" y2="150" stroke="#2D1B69" stroke-width="2.4"/>

  <!-- Etiqueta de pendiente -->
  <text x="590" y="225" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#2D1B69" transform="rotate(-44 590 225)">pendiente = h</text>

  <!-- Zona sin emisión (sombreada) -->
  <rect x="400" y="100" width="55" height="240" fill="#8A8A8A" opacity="0.12"/>
  <text x="427" y="225" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#8A8A8A" text-anchor="middle" transform="rotate(-90 427 225)">sin emisión</text>

  <!-- Fórmula al pie -->
  <text x="360" y="415" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#1A1A1A" text-anchor="middle">
    K_max = hν − Φ
  </text>
  <text x="360" y="432" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">
    bajo ν₀ no hay emisión sin importar la intensidad luminosa — imposible de explicar desde Maxwell
  </text>
</svg>
