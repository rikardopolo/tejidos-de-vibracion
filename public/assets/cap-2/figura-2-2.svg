<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" role="img" aria-labelledby="t22">
  <title id="t22">Cinco modos normales de una cuerda con extremos fijos y la superposición ponderada que produce el timbre</title>

  <!-- Función helper conceptual: cada panel mide 720x100 con altura 80 para sinusoide -->
  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Modos normales de la cuerda y superposición de armónicos</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">solución de Bernoulli 1753 — fundamento del timbre</text>

  <!-- k=1 -->
  <g transform="translate(0,70)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <path d="M90 60 Q360 -10 630 60" stroke="#2D1B69" stroke-width="2.4" fill="none"/>
    <circle cx="90" cy="60" r="4" fill="#2D1B69"/>
    <circle cx="630" cy="60" r="4" fill="#2D1B69"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">k = 1</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#B68914">f₁ = c/2L</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="11" fill="#8A8A8A">fundamental · sin nodos internos</text>
  </g>

  <!-- k=2 -->
  <g transform="translate(0,170)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <path d="M90 60 Q225 -25 360 60 Q495 145 630 60" stroke="#2D1B69" stroke-width="2.4" fill="none"/>
    <circle cx="90" cy="60" r="4" fill="#2D1B69"/>
    <circle cx="360" cy="60" r="4" fill="#2D1B69"/>
    <circle cx="630" cy="60" r="4" fill="#2D1B69"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">k = 2</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#B68914">f₂ = 2·f₁</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="11" fill="#8A8A8A">primer sobretono · 1 nodo</text>
  </g>

  <!-- k=3 -->
  <g transform="translate(0,270)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <path d="M90 60 Q180 -20 270 60 Q360 140 450 60 Q540 -20 630 60" stroke="#2D1B69" stroke-width="2.4" fill="none"/>
    <circle cx="90" cy="60" r="3.5" fill="#2D1B69"/>
    <circle cx="270" cy="60" r="3.5" fill="#2D1B69"/>
    <circle cx="450" cy="60" r="3.5" fill="#2D1B69"/>
    <circle cx="630" cy="60" r="3.5" fill="#2D1B69"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">k = 3</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#B68914">f₃ = 3·f₁</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="11" fill="#8A8A8A">2 nodos internos</text>
  </g>

  <!-- k=4 -->
  <g transform="translate(0,370)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <path d="M90 60 Q157.5 -15 225 60 Q292.5 135 360 60 Q427.5 -15 495 60 Q562.5 135 630 60" stroke="#2D1B69" stroke-width="2.2" fill="none"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">k = 4</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#B68914">f₄ = 4·f₁</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="11" fill="#8A8A8A">3 nodos internos</text>
  </g>

  <!-- k=5 -->
  <g transform="translate(0,470)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <path d="M90 60 Q144 -10 198 60 Q252 130 306 60 Q360 -10 414 60 Q468 130 522 60 Q576 -10 630 60" stroke="#2D1B69" stroke-width="2.2" fill="none"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">k = 5</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#B68914">f₅ = 5·f₁</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="11" fill="#8A8A8A">4 nodos internos</text>
  </g>

  <!-- Separador -->
  <line x1="90" y1="595" x2="630" y2="595" stroke="#B68914" stroke-width="0.8" stroke-dasharray="4 6"/>
  <text x="360" y="615" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#B68914" text-anchor="middle">Σ · superposición ponderada</text>

  <!-- Suma timbre: cuerda real con armónicos a1=1, a2=0.5, a3=0.3, a4=0.15, a5=0.05 -->
  <!-- Aproximación visual: sumar las 5 sinusoides escaladas -->
  <g transform="translate(0,630)">
    <line x1="90" y1="60" x2="630" y2="60" stroke="#B8B3AB" stroke-width="0.6"/>
    <!-- Curva sintética con perturbaciones del timbre -->
    <path d="M90 60 C 140 -8, 210 -18, 270 32 C 320 70, 360 -22, 400 8 C 450 50, 510 130, 560 78 C 600 38, 620 70, 630 60" stroke="#1A1A1A" stroke-width="2.6" fill="none"/>
    <circle cx="90" cy="60" r="4" fill="#1A1A1A"/>
    <circle cx="630" cy="60" r="4" fill="#1A1A1A"/>
    <text x="46" y="64" font-family="Georgia, serif" font-size="13" fill="#1A1A1A" text-anchor="end">u(x,t)</text>
    <text x="640" y="58" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#B68914">timbre resultante</text>
    <text x="640" y="74" font-family="Georgia, serif" font-size="10" fill="#8A8A8A">a₁=1.0  a₂=0.5  a₃=0.3</text>
    <text x="640" y="87" font-family="Georgia, serif" font-size="10" fill="#8A8A8A">a₄=0.15  a₅=0.05</text>
  </g>

  <text x="360" y="745" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#3A3530" text-anchor="middle">u(x,t) = Σ aₖ · sin(kπx/L) · cos(kπct/L)</text>
</svg>
