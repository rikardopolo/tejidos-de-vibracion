<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t21">
  <title id="t21">Cuerda tensa vibrando en su modo fundamental con las tres variables de Galileo</title>
  <defs>
    <marker id="ar21" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B68914"/>
    </marker>
  </defs>

  <!-- Anclajes -->
  <rect x="78"  y="160" width="14" height="120" fill="#1A1A1A"/>
  <rect x="628" y="160" width="14" height="120" fill="#1A1A1A"/>
  <circle cx="92"  cy="220" r="5" fill="#2D1B69"/>
  <circle cx="628" cy="220" r="5" fill="#2D1B69"/>

  <!-- Cuerda gruesa (densidad alta μ alta) en reposo, gris suave -->
  <path d="M92 240 Q360 240 628 240" stroke="#B8B3AB" stroke-width="5" fill="none"/>
  <text x="640" y="246" font-family="Georgia, serif" font-size="13" fill="#8A8A8A" font-style="italic">μ alta</text>

  <!-- Cuerda delgada vibrando en modo fundamental -->
  <path d="M92 220 Q360 95 628 220" stroke="#2D1B69" stroke-width="2.6" fill="none"/>
  <path d="M92 220 Q360 345 628 220" stroke="#2D1B69" stroke-width="2.6" fill="none" opacity="0.35" stroke-dasharray="4 4"/>

  <!-- Antinodo central -->
  <circle cx="360" cy="95" r="6" fill="#B68914"/>
  <line x1="360" y1="95" x2="360" y2="220" stroke="#B68914" stroke-dasharray="3 4" stroke-width="1"/>
  <text x="370" y="90" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530">antinodo</text>

  <!-- Nodos -->
  <text x="60"  y="200" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530">nodo</text>
  <text x="618" y="200" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="end">nodo</text>

  <!-- Longitud L con flechas dobles -->
  <line x1="92" y1="300" x2="628" y2="300" stroke="#B68914" stroke-width="1.5" marker-start="url(#ar21)" marker-end="url(#ar21)"/>
  <text x="360" y="320" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#B68914" text-anchor="middle">L · longitud</text>

  <!-- Tensión T -->
  <line x1="635" y1="220" x2="700" y2="220" stroke="#B68914" stroke-width="2" marker-end="url(#ar21)"/>
  <text x="668" y="210" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#B68914" text-anchor="middle">T</text>

  <line x1="85" y1="220" x2="20" y2="220" stroke="#B68914" stroke-width="2" marker-end="url(#ar21)"/>
  <text x="52" y="210" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#B68914" text-anchor="middle">T</text>

  <!-- Etiqueta densidad μ -->
  <text x="360" y="265" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#8A8A8A" text-anchor="middle">μ · densidad lineal (cuerdas en paralelo, gruesa y delgada)</text>

  <!-- Fórmula compacta de Mersenne -->
  <text x="360" y="395" font-family="Georgia, serif" font-size="20" fill="#1A1A1A" text-anchor="middle">
    f = <tspan font-style="italic">1 / 2L</tspan> · √(T/μ)
  </text>
  <text x="360" y="418" font-family="Georgia, serif" font-size="12" fill="#8A8A8A" text-anchor="middle" font-style="italic">fórmula de Mersenne, 1636 — derivada experimental en §2.2</text>

  <!-- Título superior -->
  <text x="360" y="40" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Modo fundamental de una cuerda tensa</text>
  <text x="360" y="60" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">tres variables manipulables: longitud L · tensión T · densidad lineal μ</text>
</svg>
