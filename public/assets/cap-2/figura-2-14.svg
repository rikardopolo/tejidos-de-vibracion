<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="t214">
  <title id="t214">Cuatro siglos de la ciencia que aprendió a escuchar — línea de tiempo 1636–2015</title>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">Cuatro siglos de la ciencia que aprendió a escuchar</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">línea de tiempo 1636 – 2015 · agrupada en cuatro fases</text>

  <!-- Eje horizontal -->
  <line x1="60" y1="320" x2="660" y2="320" stroke="#1A1A1A" stroke-width="1.4"/>

  <!-- Ticks decenales -->
  <g stroke="#8A8A8A" stroke-width="0.6" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">
    <line x1="100" y1="320" x2="100" y2="326"/>
    <text x="100" y="342">1650</text>
    <line x1="180" y1="320" x2="180" y2="326"/>
    <text x="180" y="342">1750</text>
    <line x1="260" y1="320" x2="260" y2="326"/>
    <text x="260" y="342">1820</text>
    <line x1="340" y1="320" x2="340" y2="326"/>
    <text x="340" y="342">1865</text>
    <line x1="430" y1="320" x2="430" y2="326"/>
    <text x="430" y="342">1900</text>
    <line x1="520" y1="320" x2="520" y2="326"/>
    <text x="520" y="342">1930</text>
    <line x1="640" y1="320" x2="640" y2="326"/>
    <text x="640" y="342">2015</text>
  </g>

  <!-- Bandas de fase (sutiles, debajo) -->
  <g opacity="0.18">
    <rect x="60" y="358" width="195" height="14" fill="#B68914"/>
    <rect x="255" y="358" width="155" height="14" fill="#1D9E75"/>
    <rect x="410" y="358" width="130" height="14" fill="#2D1B69"/>
    <rect x="540" y="358" width="120" height="14" fill="#9B2A2A"/>
  </g>
  <g font-family="Georgia, serif" font-size="10" font-style="italic" text-anchor="middle">
    <text x="157" y="386" fill="#B68914">Fase I · clásica</text>
    <text x="332" y="386" fill="#1D9E75">Fase II · electromagnética</text>
    <text x="475" y="386" fill="#2D1B69">Fase III · cuántica</text>
    <text x="600" y="386" fill="#9B2A2A">Fase IV · frontera</text>
  </g>

  <!-- HITOS (cada uno: marcador + año + autor + descubrimiento) -->
  <!-- Posicionar en eje X según años. Función mental:
       1636-Mersenne x=98, 1638-Galileo x=100, 1747 x=178, 1748 x=180, 1753 x=185,
       1822 x=263, 1863 x=327, 1865 x=331, 1887 x=363,
       1900 x=429, 1905 x=437, 1907 x=440, 1912 x=453, 1925-26 x=487, 1932 x=510,
       2004 x=617, 2015 x=648 -->

  <!-- Alternar arriba/abajo del eje para evitar superposición -->

  <!-- 1636 Mersenne (arriba) -->
  <g transform="translate(98,320)">
    <line x1="0" y1="0" x2="0" y2="-90" stroke="#B68914" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#B68914"/>
    <text x="0" y="-100" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">1636</text>
    <text x="0" y="-114" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Mersenne</text>
    <text x="0" y="-126" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">84 Hz</text>
  </g>

  <!-- 1638 Galileo (abajo) -->
  <g transform="translate(110,320)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#B68914" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#B68914"/>
    <text x="0" y="52" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">1638</text>
    <text x="0" y="66" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Galileo</text>
    <text x="0" y="78" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">Discorsi</text>
  </g>

  <!-- 1747 D'Alembert (arriba) -->
  <g transform="translate(178,320)">
    <line x1="0" y1="0" x2="0" y2="-130" stroke="#B68914" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#B68914"/>
    <text x="0" y="-140" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">1747</text>
    <text x="0" y="-154" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">D'Alembert</text>
    <text x="0" y="-166" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">ec. de onda</text>
  </g>

  <!-- 1753 Bernoulli (abajo) -->
  <g transform="translate(192,320)">
    <line x1="0" y1="0" x2="0" y2="90" stroke="#B68914" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#B68914"/>
    <text x="0" y="102" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#B68914" text-anchor="middle">1748–53</text>
    <text x="0" y="116" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Euler · Bernoulli</text>
    <text x="0" y="128" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">modos normales</text>
  </g>

  <!-- 1822 Fourier (arriba) -->
  <g transform="translate(263,320)">
    <line x1="0" y1="0" x2="0" y2="-65" stroke="#1D9E75" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#1D9E75"/>
    <text x="0" y="-75" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#1D9E75" text-anchor="middle">1822</text>
    <text x="0" y="-89" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Fourier</text>
    <text x="0" y="-101" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">análisis espectral</text>
  </g>

  <!-- 1863 Helmholtz (abajo) -->
  <g transform="translate(327,320)">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#1D9E75" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#1D9E75"/>
    <text x="0" y="172" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#1D9E75" text-anchor="middle">1863</text>
    <text x="0" y="186" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Helmholtz</text>
    <text x="0" y="198" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">cóclea = piano</text>
  </g>

  <!-- 1865 Maxwell (arriba) -->
  <g transform="translate(345,320)">
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#1D9E75" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#1D9E75"/>
    <text x="0" y="-190" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#1D9E75" text-anchor="middle">1865</text>
    <text x="0" y="-204" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Maxwell</text>
    <text x="0" y="-216" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">ecs. EM</text>
  </g>

  <!-- 1887 Hertz (abajo) -->
  <g transform="translate(380,320)">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#1D9E75" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#1D9E75"/>
    <text x="0" y="132" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#1D9E75" text-anchor="middle">1887</text>
    <text x="0" y="146" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Hertz</text>
    <text x="0" y="158" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">transmisión inalámbrica</text>
  </g>

  <!-- 1900 Planck (arriba) -->
  <g transform="translate(430,320)">
    <line x1="0" y1="0" x2="0" y2="-110" stroke="#2D1B69" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#2D1B69"/>
    <text x="0" y="-120" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69" text-anchor="middle">1900</text>
    <text x="0" y="-134" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Planck</text>
    <text x="0" y="-146" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">cuanto</text>
  </g>

  <!-- 1905-07 Einstein (abajo) -->
  <g transform="translate(450,320)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#2D1B69" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#2D1B69"/>
    <text x="0" y="72" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69" text-anchor="middle">1905 · 1907</text>
    <text x="0" y="86" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Einstein</text>
    <text x="0" y="98" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">fotones · sólidos</text>
  </g>

  <!-- 1912 Debye (arriba) -->
  <g transform="translate(470,320)">
    <line x1="0" y1="0" x2="0" y2="-65" stroke="#2D1B69" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#2D1B69"/>
    <text x="0" y="-75" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69" text-anchor="middle">1912</text>
    <text x="0" y="-89" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Debye</text>
    <text x="0" y="-101" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">fonones</text>
  </g>

  <!-- 1925-26 Schrödinger (abajo) -->
  <g transform="translate(495,320)">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#2D1B69" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#2D1B69"/>
    <text x="0" y="172" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69" text-anchor="middle">1926</text>
    <text x="0" y="186" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Schrödinger</text>
    <text x="0" y="198" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">función de onda ψ</text>
  </g>

  <!-- 1932 Tamm (arriba) -->
  <g transform="translate(525,320)">
    <line x1="0" y1="0" x2="0" y2="-150" stroke="#2D1B69" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#2D1B69"/>
    <text x="0" y="-160" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2D1B69" text-anchor="middle">1932</text>
    <text x="0" y="-174" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Tamm · Frenkel</text>
    <text x="0" y="-186" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">«fonón»</text>
  </g>

  <!-- 2004 Gimzewski (arriba) -->
  <g transform="translate(610,320)">
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#9B2A2A" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#9B2A2A"/>
    <text x="0" y="-90" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#9B2A2A" text-anchor="middle">2004</text>
    <text x="0" y="-104" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">Gimzewski</text>
    <text x="0" y="-116" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">levadura vibrante</text>
  </g>

  <!-- 2015 LIGO (abajo) -->
  <g transform="translate(648,320)">
    <line x1="0" y1="0" x2="0" y2="110" stroke="#9B2A2A" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#9B2A2A"/>
    <text x="0" y="122" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#9B2A2A" text-anchor="middle">2015</text>
    <text x="0" y="136" font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">LIGO</text>
    <text x="0" y="148" font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">GW150914</text>
  </g>

  <!-- Pie con observación de velocidad asimétrica -->
  <text x="360" y="540" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#8A8A8A" text-anchor="middle">
    400 años de Mersenne a LIGO · pero solo 27 años (1900–1927) para que la mecánica cuántica tomara forma
  </text>
</svg>
