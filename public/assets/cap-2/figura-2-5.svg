<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t25">
  <title id="t25">Espectro electromagnético completo en escala logarítmica con la ventana visible humana destacada</title>
  <defs>
    <linearGradient id="visiblerb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B1A4F"/>
      <stop offset="20%"  stop-color="#C5312C"/>
      <stop offset="40%"  stop-color="#E5B628"/>
      <stop offset="60%"  stop-color="#3FA34D"/>
      <stop offset="80%"  stop-color="#2D5BA8"/>
      <stop offset="100%" stop-color="#5A2E8B"/>
    </linearGradient>
  </defs>

  <text x="360" y="28" font-family="Georgia, serif" font-size="17" fill="#1A1A1A" text-anchor="middle">El espectro electromagnético completo</text>
  <text x="360" y="48" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#3A3530" text-anchor="middle">~24 órdenes de magnitud · la ventana visible es menos de una octava</text>

  <!-- Banda continua de gradiente sutil -->
  <rect x="60" y="120" width="600" height="44" fill="#E5DBBE" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- Subbandas con color sutil de identificación -->
  <rect x="60"  y="120" width="100" height="44" fill="#2D1B69" opacity="0.25"/>
  <rect x="160" y="120" width="80"  height="44" fill="#2D1B69" opacity="0.35"/>
  <rect x="240" y="120" width="90"  height="44" fill="#1D9E75" opacity="0.30"/>
  <rect x="330" y="120" width="30"  height="44" fill="url(#visiblerb)"/>
  <rect x="360" y="120" width="80"  height="44" fill="#B68914" opacity="0.30"/>
  <rect x="440" y="120" width="110" height="44" fill="#B68914" opacity="0.50"/>
  <rect x="550" y="120" width="110" height="44" fill="#1A1A1A" opacity="0.65"/>

  <!-- Recuadro visible destacado -->
  <rect x="328" y="105" width="34" height="74" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
  <line x1="345" y1="105" x2="345" y2="80" stroke="#1A1A1A" stroke-width="0.8"/>
  <text x="345" y="74" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1A1A1A" text-anchor="middle">visible</text>
  <text x="345" y="62" font-family="Georgia, serif" font-size="10" fill="#8A8A8A" text-anchor="middle">~1 octava de ~24</text>

  <!-- Etiquetas superiores: bandas -->
  <g font-family="Georgia, serif" font-size="11" fill="#1A1A1A" text-anchor="middle">
    <text x="110" y="113">Radio</text>
    <text x="200" y="113">Microondas</text>
    <text x="285" y="113">Infrarrojo</text>
    <text x="400" y="113">UV</text>
    <text x="495" y="113">Rayos X</text>
    <text x="605" y="113">Gamma</text>
  </g>

  <!-- Eje inferior: frecuencias y longitudes -->
  <g font-family="Georgia, serif" font-size="10" fill="#3A3530" text-anchor="middle">
    <text x="110" y="182">kHz–GHz</text>
    <text x="200" y="182">GHz</text>
    <text x="285" y="182">THz bajos</text>
    <text x="345" y="182">400–790 THz</text>
    <text x="400" y="182">PHz</text>
    <text x="495" y="182">ExHz</text>
    <text x="605" y="182">ZHz</text>
  </g>

  <!-- Eje numérico aproximado -->
  <line x1="60" y1="200" x2="660" y2="200" stroke="#8A8A8A" stroke-width="0.6"/>
  <g font-family="Georgia, serif" font-size="9" fill="#8A8A8A" text-anchor="middle">
    <text x="60"  y="214">10³</text>
    <text x="160" y="214">10⁹</text>
    <text x="260" y="214">10¹²</text>
    <text x="345" y="214">10¹⁴</text>
    <text x="430" y="214">10¹⁶</text>
    <text x="540" y="214">10¹⁸</text>
    <text x="660" y="214">10²¹</text>
  </g>
  <text x="360" y="232" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#8A8A8A" text-anchor="middle">frecuencia · hercios (escala log)</text>

  <!-- Pictogramas debajo de cada banda -->
  <g transform="translate(0,275)" font-family="Georgia, serif" font-size="10" fill="#3A3530" text-anchor="middle">
    <!-- Radio: torre -->
    <g transform="translate(110,0)">
      <line x1="0" y1="30" x2="0" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="-8" y1="30" x2="0" y2="0" stroke="#1A1A1A" stroke-width="0.8"/>
      <line x1="8" y1="30" x2="0" y2="0" stroke="#1A1A1A" stroke-width="0.8"/>
      <circle cx="0" cy="-4" r="3" fill="#B68914"/>
      <path d="M-12 -8 Q0 -18 12 -8" stroke="#2D1B69" stroke-width="0.8" fill="none"/>
      <text x="0" y="48">WiFi · radio</text>
    </g>
    <!-- Microondas: horno -->
    <g transform="translate(200,0)">
      <rect x="-12" y="0" width="24" height="22" fill="none" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="-8" y="4" width="12" height="14" fill="#1A1A1A" opacity="0.15"/>
      <text x="0" y="48">horno μ-ondas</text>
    </g>
    <!-- IR: calor -->
    <g transform="translate(285,0)">
      <circle cx="0" cy="12" r="10" fill="none" stroke="#B68914" stroke-width="1"/>
      <path d="M-14 -2 L-18 -6 M14 -2 L18 -6 M0 -4 L0 -10" stroke="#B68914" stroke-width="1"/>
      <text x="0" y="48">calor radiante</text>
    </g>
    <!-- Visible: ojo -->
    <g transform="translate(345,0)">
      <path d="M-14 12 Q0 -2 14 12 Q0 26 -14 12 Z" fill="none" stroke="#1A1A1A" stroke-width="1"/>
      <circle cx="0" cy="12" r="4" fill="#1A1A1A"/>
      <text x="0" y="48">ojo humano</text>
    </g>
    <!-- UV: sol -->
    <g transform="translate(400,0)">
      <circle cx="0" cy="12" r="6" fill="#B68914"/>
      <g stroke="#B68914" stroke-width="1">
        <line x1="0" y1="0" x2="0" y2="-4"/>
        <line x1="0" y1="24" x2="0" y2="28"/>
        <line x1="-12" y1="12" x2="-16" y2="12"/>
        <line x1="12" y1="12" x2="16" y2="12"/>
      </g>
      <text x="0" y="48">UV solar</text>
    </g>
    <!-- X: cruz -->
    <g transform="translate(495,0)">
      <text x="0" y="18" font-family="Georgia, serif" font-size="22" fill="#1A1A1A" text-anchor="middle" font-weight="bold">X</text>
      <text x="0" y="48">radiografía</text>
    </g>
    <!-- Gamma: γ -->
    <g transform="translate(605,0)">
      <text x="0" y="18" font-family="Georgia, serif" font-size="22" fill="#1A1A1A" text-anchor="middle">γ</text>
      <text x="0" y="48">radiactividad</text>
    </g>
  </g>

  <text x="360" y="395" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#1A1A1A" text-anchor="middle">
    Todas estas bandas son la misma física a frecuencias diferentes.
  </text>
  <text x="360" y="415" font-family="Georgia, serif" font-size="11" fill="#8A8A8A" text-anchor="middle">
    Las cuatro ecuaciones que Maxwell escribió entre 1861 y 1865 describen el espectro entero.
  </text>
</svg>
